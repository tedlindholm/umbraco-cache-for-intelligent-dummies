name: Build book PDF

on:
  push:
    branches: [main]
    paths:
      - "book/**.md"
      - "book/pdf-export.css"
      - "book/assets/**"
      - "vendor/**"
      - "generate-pdf-chrome.js"

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm Chrome is available
        run: node generate-pdf-chrome.js --check-chrome

      - name: Build PDF
        run: node generate-pdf-chrome.js

      - name: Confirm PDF was created
        run: test -s book/umbraco-cache-for-intelligent-dummies.pdf

      - name: Publish PDF to the "latest-pdf" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PDF_PATH="book/umbraco-cache-for-intelligent-dummies.pdf"
          if gh release view latest-pdf --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest-pdf "$PDF_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create latest-pdf "$PDF_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest PDF build" \
              --notes "Automatically rebuilt from book/*.md on push to main."
          fi

      - name: Publish PDF to today's dated release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PDF_PATH="book/umbraco-cache-for-intelligent-dummies.pdf"
          DATE_TAG="pdf-$(date -u +%Y-%m-%d)"
          if gh release view "$DATE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$DATE_TAG" "$PDF_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$DATE_TAG" "$PDF_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "PDF build ($(date -u +%Y-%m-%d))" \
              --notes "Automatically rebuilt from book/*.md on push to main. Multiple same-day pushes update this release." \
              --latest=false
          fi
