<svg viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c98cae"/>
    </marker>
  </defs>

  <rect width="980" height="640" fill="white"/>

  <text x="490" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2f3142">Blob metadata cache flow</text>
  <text x="490" y="62" text-anchor="middle" font-size="12" fill="#6b708c">Reads try HybridCache first; local file operations clear the affected metadata key.</text>

  <rect x="54" y="96" width="872" height="262" rx="14" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="78" y="126" font-size="14" font-weight="700" fill="#e35aa0">Read path</text>

  <rect x="86" y="164" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="86" y="164" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="180" y="188" text-anchor="middle" font-size="12" fill="#2f3142">Request needs</text>
  <text x="180" y="204" text-anchor="middle" font-size="12" fill="#2f3142">blob metadata</text>

  <rect x="330" y="156" width="190" height="74" rx="30" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="425" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">HybridCache</text>
  <text x="425" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">has the key?</text>

  <rect x="660" y="116" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="660" y="116" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="754" y="140" text-anchor="middle" font-size="12" fill="#2f3142">Return size and</text>
  <text x="754" y="156" text-anchor="middle" font-size="12" fill="#2f3142">last modified</text>

  <rect x="660" y="238" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="660" y="238" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="754" y="262" text-anchor="middle" font-size="12" fill="#2f3142">Azure Blob Storage</text>
  <text x="754" y="278" text-anchor="middle" font-size="12" fill="#2f3142">GetProperties()</text>

  <rect x="330" y="268" width="190" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="330" y="268" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="425" y="292" text-anchor="middle" font-size="12" fill="#2f3142">Store result in</text>
  <text x="425" y="308" text-anchor="middle" font-size="12" fill="#2f3142">HybridCache</text>

  <rect x="54" y="404" width="872" height="150" rx="14" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="78" y="434" font-size="14" font-weight="700" fill="#e35aa0">Write path</text>

  <rect x="86" y="464" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="86" y="464" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="180" y="488" text-anchor="middle" font-size="12" fill="#2f3142">AddFile, DeleteFile,</text>
  <text x="180" y="504" text-anchor="middle" font-size="12" fill="#2f3142">DeleteDirectory</text>

  <rect x="396" y="464" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="396" y="464" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="490" y="488" text-anchor="middle" font-size="12" fill="#2f3142">Invalidate affected</text>
  <text x="490" y="504" text-anchor="middle" font-size="12" fill="#2f3142">metadata key</text>

  <rect x="704" y="464" width="188" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="704" y="464" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="798" y="488" text-anchor="middle" font-size="12" fill="#2f3142">Next read refetches</text>
  <text x="798" y="504" text-anchor="middle" font-size="12" fill="#2f3142">fresh metadata</text>

  <g stroke="#c98cae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M274 193 H322"/>
    <path d="M520 181 H652 V145 H660"/>
    <path d="M520 205 H590 V267 H652"/>
    <path d="M660 267 H590 V297 H528"/>
    <path d="M520 297 H880 V145 H856"/>
    <path d="M274 493 H388"/>
    <path d="M584 493 H696"/>
  </g>

  <g font-size="11" font-style="italic" fill="#e35aa0">
    <rect x="566" y="160" width="36" height="20" rx="10" fill="white"/>
    <text x="584" y="174" text-anchor="middle">hit</text>
    <rect x="566" y="250" width="42" height="20" rx="10" fill="white"/>
    <text x="587" y="264" text-anchor="middle">miss</text>
  </g>

  <text x="490" y="598" text-anchor="middle" font-size="12" fill="#6b708c">The cache saves repeated Azure metadata lookups; the busting rule is local and key-specific.</text>
</svg>
