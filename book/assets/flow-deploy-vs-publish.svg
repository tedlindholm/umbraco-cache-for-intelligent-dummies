<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="760" height="420" fill="white"/>

  <!-- column headers -->
  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#4a4a4a">Normal CMS publish</text>
  <text x="580" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#4a4a4a">Deploy operation</text>

  <!-- centre divider -->
  <path d="M380,55 V328" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <text x="380" y="212" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">same trigger —</text>
  <text x="380" y="230" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">content changes</text>
  <text x="380" y="252" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">different notification</text>
  <text x="380" y="270" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">strategy</text>

  <!-- ===== LEFT COLUMN: normal publish ===== -->

  <!-- row 1 -->
  <rect x="30" y="60" width="300" height="48" rx="10" fill="#fdf1f7" filter="url(#soft7)"/>
  <rect x="30" y="60" width="6" height="48" rx="3" fill="url(#lineGrad7)"/>
  <text x="180" y="89" text-anchor="middle" font-size="13" fill="#333">One item saved</text>

  <path d="M180,108 V128" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow7)"/>

  <!-- row 2: outcome -->
  <rect x="30" y="128" width="300" height="64" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Refresher fires immediately</text>

  <!-- ===== RIGHT COLUMN: Deploy operation ===== -->

  <!-- row 1 -->
  <rect x="430" y="60" width="300" height="48" rx="10" fill="#fdf1f7" filter="url(#soft7)"/>
  <rect x="430" y="60" width="6" height="48" rx="3" fill="url(#lineGrad7)"/>
  <text x="580" y="89" text-anchor="middle" font-size="13" fill="#333">Many items transferred</text>

  <path d="M580,108 V128" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow7)"/>

  <!-- row 2 -->
  <rect x="430" y="128" width="300" height="48" rx="10" fill="#fdf1f7" filter="url(#soft7)"/>
  <rect x="430" y="128" width="6" height="48" rx="3" fill="url(#lineGrad7)"/>
  <text x="580" y="157" text-anchor="middle" font-size="13" fill="#333">Per-item notifications suppressed</text>

  <path d="M580,176 V196" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow7)"/>

  <!-- row 3 -->
  <rect x="430" y="196" width="300" height="48" rx="10" fill="#fdf1f7" filter="url(#soft7)"/>
  <rect x="430" y="196" width="6" height="48" rx="3" fill="url(#lineGrad7)"/>
  <text x="580" y="225" text-anchor="middle" font-size="13" fill="#333">Operation completes</text>

  <path d="M580,244 V264" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow7)"/>

  <!-- row 4: outcome -->
  <rect x="430" y="264" width="300" height="64" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="580" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Refresher fires once</text>
  <text x="580" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">for all changes</text>

  <!-- column captions -->
  <text x="180" y="350" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">one save = one refresh</text>
  <text x="580" y="350" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">many changes = one refresh, after the batch</text>
</svg>
