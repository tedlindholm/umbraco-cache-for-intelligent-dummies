<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGradDel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="softDel" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDel" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="760" height="480" fill="white"/>

  <!-- fork from decision to the two columns -->
  <path d="M300,65 Q300,80 170,95" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <path d="M460,65 Q460,80 590,95" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <text x="190" y="82" font-size="11" fill="#e35aa0" font-style="italic">tree "Delete"</text>
  <text x="470" y="82" font-size="11" fill="#e35aa0" font-style="italic" text-anchor="end">empty bin / Delete()</text>

  <!-- decision -->
  <rect x="250" y="15" width="260" height="50" rx="25" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="380" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">How was the item removed?</text>

  <!-- vertical connectors: left column -->
  <path d="M170,159 V179" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <path d="M170,227 V247" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <path d="M170,311 V331" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>

  <!-- vertical connectors: right column -->
  <path d="M590,159 V179" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <path d="M590,227 V247" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>
  <path d="M590,311 V331" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowDel)"/>

  <!-- shared-notification connector between the two row-2 boxes -->
  <path d="M310,203 H450" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <text x="380" y="197" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">same notification —</text>
  <text x="380" y="221" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">different content state</text>

  <!-- ===== LEFT COLUMN: soft delete ===== -->

  <!-- row 1 -->
  <rect x="30" y="95" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="30" y="95" width="6" height="64" rx="3" fill="url(#lineGradDel)"/>
  <text x="170" y="121" text-anchor="middle" font-size="13" fill="#333">MoveToRecycleBin() runs —</text>
  <text x="170" y="139" text-anchor="middle" font-size="13" fill="#333">content row still exists, masked as trashed</text>

  <!-- row 2 -->
  <rect x="30" y="179" width="280" height="48" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="30" y="179" width="6" height="48" rx="3" fill="url(#lineGradDel)"/>
  <text x="170" y="208" text-anchor="middle" font-size="12.5" fill="#333">ContentCacheRefresherNotification fires</text>

  <!-- row 3 -->
  <rect x="30" y="247" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="30" y="247" width="6" height="64" rx="3" fill="url(#lineGradDel)"/>
  <text x="170" y="273" text-anchor="middle" font-size="12.5" fill="#333">Eviction provider calls GetById(ContentKey)</text>
  <text x="170" y="291" text-anchor="middle" font-size="13" fill="#333">→ content found, type can be checked</text>

  <!-- row 4: outcome -->
  <rect x="30" y="331" width="280" height="64" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="170" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Evict latest-news</text>
  <text x="170" y="375" text-anchor="middle" font-size="12.5" fill="#4a4a4a">only if the item is a newsArticle</text>

  <!-- ===== RIGHT COLUMN: hard delete ===== -->

  <!-- row 1 -->
  <rect x="450" y="95" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="450" y="95" width="6" height="64" rx="3" fill="url(#lineGradDel)"/>
  <text x="590" y="121" text-anchor="middle" font-size="13" fill="#333">Content row is deleted immediately —</text>
  <text x="590" y="139" text-anchor="middle" font-size="13" fill="#333">nothing left in the store to inspect</text>

  <!-- row 2 -->
  <rect x="450" y="179" width="280" height="48" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="450" y="179" width="6" height="48" rx="3" fill="url(#lineGradDel)"/>
  <text x="590" y="208" text-anchor="middle" font-size="12.5" fill="#333">ContentCacheRefresherNotification fires</text>

  <!-- row 3 -->
  <rect x="450" y="247" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softDel)"/>
  <rect x="450" y="247" width="6" height="64" rx="3" fill="url(#lineGradDel)"/>
  <text x="590" y="273" text-anchor="middle" font-size="12.5" fill="#333">Eviction provider calls GetById(ContentKey)</text>
  <text x="590" y="291" text-anchor="middle" font-size="13" fill="#333">→ returns null, type unknown</text>

  <!-- row 4: outcome -->
  <rect x="450" y="331" width="280" height="64" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="590" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Evict latest-news</text>
  <text x="590" y="375" text-anchor="middle" font-size="12.5" fill="#4a4a4a">unconditionally (conservative)</text>

  <!-- column captions -->
  <text x="170" y="428" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">soft delete — item still resolvable while trashed</text>
  <text x="590" y="428" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">hard delete — item is already gone</text>
</svg>
