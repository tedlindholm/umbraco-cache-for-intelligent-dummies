<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGradSeed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="softSeed" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowSeed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="760" height="460" fill="white"/>

  <!-- column top labels -->
  <text x="170" y="26" text-anchor="middle" font-size="11" fill="#e35aa0" font-style="italic">once, at startup</text>
  <text x="590" y="26" text-anchor="middle" font-size="11" fill="#e35aa0" font-style="italic">sometime later</text>

  <!-- ===== LEFT COLUMN: startup seeding (solid = happens once, in order) ===== -->

  <!-- row 1 -->
  <rect x="30" y="40" width="280" height="48" rx="10" fill="#fdf1f7" filter="url(#softSeed)"/>
  <rect x="30" y="40" width="6" height="48" rx="3" fill="url(#lineGradSeed)"/>
  <text x="170" y="69" text-anchor="middle" font-size="13" fill="#333">Server starts</text>

  <path d="M170,88 V108" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 2 -->
  <rect x="30" y="108" width="280" height="48" rx="10" fill="#fdf1f7" filter="url(#softSeed)"/>
  <rect x="30" y="108" width="6" height="48" rx="3" fill="url(#lineGradSeed)"/>
  <text x="170" y="137" text-anchor="middle" font-size="13" fill="#333">Run seed providers</text>

  <path d="M170,156 V176" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 3 -->
  <rect x="30" y="176" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softSeed)"/>
  <rect x="30" y="176" width="6" height="64" rx="3" fill="url(#lineGradSeed)"/>
  <text x="170" y="202" text-anchor="middle" font-size="13" fill="#333">Seed-key set is computed</text>
  <text x="170" y="220" text-anchor="middle" font-size="13" fill="#333">and memoised</text>

  <path d="M170,240 V260" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 4: outcome -->
  <rect x="30" y="260" width="280" height="64" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="170" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Initial cache entries</text>
  <text x="170" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">are warmed</text>

  <!-- ===== RIGHT COLUMN: content added after startup (dashed = not guaranteed timing) ===== -->

  <text x="590" y="69" text-anchor="middle" font-size="12" fill="#c687aa" font-style="italic">(time passes)</text>
  <path d="M590,80 V108" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 2 -->
  <rect x="450" y="108" width="280" height="48" rx="10" fill="#fdf1f7" filter="url(#softSeed)"/>
  <rect x="450" y="108" width="6" height="48" rx="3" fill="url(#lineGradSeed)"/>
  <text x="590" y="137" text-anchor="middle" font-size="13" fill="#333">New content is created</text>

  <path d="M590,156 V176" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 3 -->
  <rect x="450" y="176" width="280" height="64" rx="10" fill="#fdf1f7" filter="url(#softSeed)"/>
  <rect x="450" y="176" width="6" height="64" rx="3" fill="url(#lineGradSeed)"/>
  <text x="590" y="202" text-anchor="middle" font-size="13" fill="#333">Doesn't match the already-</text>
  <text x="590" y="220" text-anchor="middle" font-size="13" fill="#333">memoised seed set</text>

  <path d="M590,240 V260" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrowSeed)"/>

  <!-- row 4: outcome (amber accent — this is the gotcha) -->
  <rect x="450" y="260" width="280" height="64" rx="10" fill="white" stroke="#c2872f" stroke-width="2"/>
  <text x="590" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Only joins the seed set after</text>
  <text x="590" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">a restart or a manual seed reset</text>

  <!-- connector between the two row-3 boxes: the shared, frozen seed set -->
  <path d="M310,208 H450" stroke="#eecbde" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <text x="380" y="202" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">same set —</text>
  <text x="380" y="226" text-anchor="middle" font-size="10.5" fill="#c687aa" font-style="italic">frozen at startup</text>

  <!-- column captions -->
  <text x="170" y="350" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">seed set is built once, in order</text>
  <text x="590" y="350" text-anchor="middle" font-size="11.5" fill="#999" font-style="italic">late arrivals miss that seed set</text>
</svg>
