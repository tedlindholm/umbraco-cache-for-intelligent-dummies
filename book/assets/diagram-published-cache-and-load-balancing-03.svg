<svg viewBox="0 0 1060 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c98cae"/>
    </marker>
  </defs>

  <rect width="1060" height="640" fill="white"/>

  <text x="530" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#2f3142">Load-balanced cache refresh</text>
  <text x="530" y="64" text-anchor="middle" font-size="12" fill="#6b708c">A publish creates one refresher instruction; every server receives it and clears its own local cache entries.</text>

  <rect x="66" y="126" width="220" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="66" y="126" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="176" y="153" text-anchor="middle" font-size="13" fill="#2f3142">Server A</text>
  <text x="176" y="170" text-anchor="middle" font-size="12" fill="#6b708c">publishes content</text>

  <rect x="420" y="126" width="220" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="420" y="126" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="153" text-anchor="middle" font-size="13" fill="#2f3142">DistributedCache</text>
  <text x="530" y="170" text-anchor="middle" font-size="12" fill="#6b708c">queues refresher payload</text>

  <rect x="774" y="126" width="220" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="774" y="126" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="884" y="153" text-anchor="middle" font-size="13" fill="#2f3142">IServerMessenger</text>
  <text x="884" y="170" text-anchor="middle" font-size="12" fill="#6b708c">broadcasts instruction</text>

  <rect x="56" y="326" width="216" height="104" rx="10" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="164" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#e35aa0">Server A</text>
  <text x="164" y="380" text-anchor="middle" font-size="12" fill="#2f3142">run matching</text>
  <text x="164" y="396" text-anchor="middle" font-size="12" fill="#2f3142">ICacheRefresher</text>
  <text x="164" y="414" text-anchor="middle" font-size="11" fill="#6b708c">clear local caches</text>

  <rect x="300" y="326" width="216" height="104" rx="10" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="408" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#e35aa0">Server B</text>
  <text x="408" y="380" text-anchor="middle" font-size="12" fill="#2f3142">run matching</text>
  <text x="408" y="396" text-anchor="middle" font-size="12" fill="#2f3142">ICacheRefresher</text>
  <text x="408" y="414" text-anchor="middle" font-size="11" fill="#6b708c">clear local caches</text>

  <rect x="544" y="326" width="216" height="104" rx="10" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="652" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#e35aa0">Server C</text>
  <text x="652" y="380" text-anchor="middle" font-size="12" fill="#2f3142">run matching</text>
  <text x="652" y="396" text-anchor="middle" font-size="12" fill="#2f3142">ICacheRefresher</text>
  <text x="652" y="414" text-anchor="middle" font-size="11" fill="#6b708c">clear local caches</text>

  <rect x="788" y="326" width="216" height="104" rx="10" fill="#fdeff6" stroke="#f5d9e8" stroke-width="1.5"/>
  <text x="896" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#e35aa0">Server D</text>
  <text x="896" y="380" text-anchor="middle" font-size="12" fill="#2f3142">run matching</text>
  <text x="896" y="396" text-anchor="middle" font-size="12" fill="#2f3142">ICacheRefresher</text>
  <text x="896" y="414" text-anchor="middle" font-size="11" fill="#6b708c">clear local caches</text>

  <rect x="306" y="506" width="448" height="58" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="306" y="506" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="530" text-anchor="middle" font-size="13" fill="#2f3142">Result: each node forgets stale local data</text>
  <text x="530" y="547" text-anchor="middle" font-size="12" fill="#6b708c">the next request rebuilds or refetches what it needs</text>

  <g stroke="#c98cae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M286 158 H412"/>
    <path d="M640 158 H766"/>
    <path d="M884 190 V254 H164 V318"/>
    <path d="M884 254 H408 V318"/>
    <path d="M884 254 H652 V318"/>
    <path d="M884 254 V318"/>
    <path d="M164 430 V462 H530 V498"/>
    <path d="M408 430 V462 H530 V498"/>
    <path d="M652 430 V462 H530 V498"/>
    <path d="M896 430 V462 H530 V498"/>
  </g>

  <g font-size="11" fill="#e35aa0">
    <rect x="322" y="147" width="58" height="22" rx="11" fill="white"/>
    <text x="351" y="162" text-anchor="middle">publish</text>
    <rect x="675" y="147" width="58" height="22" rx="11" fill="white"/>
    <text x="704" y="162" text-anchor="middle">message</text>
    <rect x="704" y="243" width="94" height="22" rx="11" fill="white"/>
    <text x="751" y="258" text-anchor="middle">run refresher</text>
  </g>
</svg>
