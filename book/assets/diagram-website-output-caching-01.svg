<text x="338" y="59.5" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">ASP.NET Output</text>
<text x="338" y="76.5" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Cache</text>
