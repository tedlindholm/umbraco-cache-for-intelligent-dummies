<path d="M338,466 h34 v16 h-34" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text x="382" y="463" text-anchor="start" font-size="11" font-weight="400" fill="#2f3142">Store HTML if policy</text>
