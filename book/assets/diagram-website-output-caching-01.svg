<text x="453" y="155" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Ask if request is</text>
<text x="453" y="169" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">cacheable</text>
<rect x="86" y="192" width="734" height="34" rx="8" fill="white" stroke="#f5d9e8"/>
