<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="engineGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <linearGradient id="lineGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="700" height="560" fill="white"/>

  <!-- Legend -->
  <rect x="30" y="18" width="18" height="13" rx="3" fill="url(#engineGrad3)"/>
  <text x="54" y="29" font-size="12" fill="#555">Microsoft-provided engine</text>
  <rect x="230" y="18" width="18" height="13" rx="3" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="254" y="29" font-size="12" fill="#555">Umbraco-built layer</text>

  <!-- Panel 1: Microsoft HybridCache -->
  <rect x="30" y="70" width="310" height="470" rx="12" fill="#fbfbfd" stroke="#e6e6f0" stroke-width="1.5" filter="url(#soft3)"/>
  <text x="185" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="url(#engineGrad3)">Microsoft HybridCache</text>

  <rect x="50" y="126" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="126" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="154" text-anchor="middle" font-size="12" fill="#333">Primary memory cache</text>

  <rect x="50" y="184" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="184" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="204" text-anchor="middle" font-size="12" fill="#333">Optional secondary</text>
  <text x="185" y="219" text-anchor="middle" font-size="12" fill="#333">distributed cache</text>

  <rect x="50" y="242" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="242" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="262" text-anchor="middle" font-size="12" fill="#333">GetOrCreateAsync</text>
  <text x="185" y="277" text-anchor="middle" font-size="12" fill="#333">read-through pattern</text>

  <rect x="50" y="300" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="300" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="328" text-anchor="middle" font-size="12" fill="#333">Stampede protection</text>

  <rect x="50" y="358" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="358" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="386" text-anchor="middle" font-size="12" fill="#333">Tags</text>

  <rect x="50" y="416" width="270" height="46" rx="8" fill="#fdf1f7"/>
  <rect x="50" y="416" width="6" height="46" rx="3" fill="url(#lineGrad3)"/>
  <text x="185" y="436" text-anchor="middle" font-size="12" fill="#333">Serialiser hooks and</text>
  <text x="185" y="451" text-anchor="middle" font-size="12" fill="#333">entry options</text>

  <!-- Panel 2: Umbraco PublishedCache.HybridCache -->
  <rect x="360" y="70" width="310" height="470" rx="12" fill="#fbfbfd" stroke="#e6e6f0" stroke-width="1.5" filter="url(#soft3)"/>
  <text x="515" y="98" text-anchor="middle" font-size="16" font-weight="700" fill="#e35aa0">Umbraco</text>
  <text x="515" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#e35aa0">PublishedCache.HybridCache</text>

  <rect x="380" y="136" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="164" text-anchor="middle" font-size="12" fill="#333">ContentCacheNode payloads</text>

  <rect x="380" y="194" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="222" text-anchor="middle" font-size="12" fill="#333">Database-backed cache source</text>

  <rect x="380" y="252" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="272" text-anchor="middle" font-size="12" fill="#333">Document, media, member,</text>
  <text x="515" y="287" text-anchor="middle" font-size="12" fill="#333">element and domain services</text>

  <rect x="380" y="310" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="330" text-anchor="middle" font-size="12" fill="#333">Seed-key providers and</text>
  <text x="515" y="345" text-anchor="middle" font-size="12" fill="#333">startup seeding</text>

  <rect x="380" y="368" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="388" text-anchor="middle" font-size="12" fill="#333">Draft and published</text>
  <text x="515" y="403" text-anchor="middle" font-size="12" fill="#333">key separation</text>

  <rect x="380" y="426" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="446" text-anchor="middle" font-size="12" fill="#333">Notification-driven refresh,</text>
  <text x="515" y="461" text-anchor="middle" font-size="12" fill="#333">rebuild and invalidation</text>

  <rect x="380" y="484" width="270" height="46" rx="8" fill="white" stroke="#e35aa0" stroke-width="1.5"/>
  <text x="515" y="504" text-anchor="middle" font-size="12" fill="#333">Local converted-object</text>
  <text x="515" y="519" text-anchor="middle" font-size="12" fill="#333">(L0) caches</text>
</svg>
