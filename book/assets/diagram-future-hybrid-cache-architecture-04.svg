<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="920" height="560" fill="white"/>
  <text x="460" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#2f3142">Pick the diagnostic route by symptom</text>

  <rect x="342" y="218" width="236" height="96" rx="18" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="460" y="254" text-anchor="middle" font-size="15" font-weight="700" fill="#2f3142">Cache symptom</text>
  <text x="460" y="278" text-anchor="middle" font-size="13" fill="#6b708c">what kind of failure are</text>
  <text x="460" y="296" text-anchor="middle" font-size="13" fill="#6b708c">you observing?</text>

  <rect x="54" y="92" width="244" height="104" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="54" y="92" width="6" height="104" rx="3" fill="url(#lineGrad)"/>
  <text x="176" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">RAM growth</text>
  <text x="176" y="151" text-anchor="middle" font-size="12" fill="#4b4d60">dotnet-gcdump and</text>
  <text x="176" y="168" text-anchor="middle" font-size="12" fill="#4b4d60">dotnet-counters</text>

  <rect x="338" y="80" width="244" height="104" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="338" y="80" width="6" height="104" rx="3" fill="url(#lineGrad)"/>
  <text x="460" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Slow requests</text>
  <text x="460" y="139" text-anchor="middle" font-size="12" fill="#4b4d60">dotnet-trace separates</text>
  <text x="460" y="156" text-anchor="middle" font-size="12" fill="#4b4d60">factory, L2, and serialise cost</text>

  <rect x="622" y="92" width="244" height="104" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="622" y="92" width="6" height="104" rx="3" fill="url(#lineGrad)"/>
  <text x="744" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Node not caching</text>
  <text x="744" y="151" text-anchor="middle" font-size="12" fill="#4b4d60">ILogger payload and</text>
  <text x="744" y="168" text-anchor="middle" font-size="12" fill="#4b4d60">key-limit warnings</text>

  <rect x="126" y="382" width="274" height="108" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="126" y="382" width="6" height="108" rx="3" fill="url(#lineGrad)"/>
  <text x="263" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Too many database hits</text>
  <text x="263" y="442" text-anchor="middle" font-size="12" fill="#4b4d60">EF Core query-cache metrics</text>
  <text x="263" y="459" text-anchor="middle" font-size="12" fill="#4b4d60">plus Redis hit/miss telemetry</text>

  <rect x="520" y="382" width="274" height="108" rx="12" fill="#fff7e8" stroke="#e2b568" filter="url(#soft)"/>
  <rect x="520" y="382" width="6" height="108" rx="3" fill="#d39b3d"/>
  <text x="657" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Stale on one server</text>
  <text x="657" y="442" text-anchor="middle" font-size="12" fill="#4b4d60">Umbraco cache-instruction</text>
  <text x="657" y="459" text-anchor="middle" font-size="12" fill="#4b4d60">table and refresher logs</text>

  <path d="M389,228 C332,208 236,212 176,196" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="286" y="214" text-anchor="middle" font-size="11" fill="#e35aa0">memory pressure</text>

  <path d="M460,218 C460,198 460,196 460,184" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="204" text-anchor="middle" font-size="11" fill="#e35aa0">latency</text>

  <path d="M531,228 C588,208 684,212 744,196" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="638" y="214" text-anchor="middle" font-size="11" fill="#e35aa0">entry not stored</text>

  <path d="M396,314 C338,348 300,364 263,382" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="326" y="352" text-anchor="middle" font-size="11" fill="#e35aa0">source pressure</text>

  <path d="M524,314 C582,348 620,364 657,382" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="592" y="352" text-anchor="middle" font-size="11" fill="#d39b3d">load-balanced stale data</text>

  <text x="460" y="526" text-anchor="middle" font-size="12" fill="#6b708c">Microsoft metrics explain process health; Umbraco logs explain distributed invalidation.</text>
</svg>
