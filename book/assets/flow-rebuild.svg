<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="700" height="500" fill="white"/>

  <!-- connectors: main spine -->
  <path d="M220,78 V104" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <path d="M220,152 V178" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <path d="M220,226 V246" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <path d="M220,310 V336" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <path d="M220,384 V410" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <text x="230" y="168" font-size="11" fill="#999" font-style="italic">deferred</text>

  <!-- side branch: immediate -->
  <path d="M400,128 H460" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow4)"/>
  <text x="405" y="120" font-size="11" fill="#e35aa0" font-style="italic">immediate</text>

  <!-- Row 1 -->
  <rect x="40" y="30" width="360" height="48" rx="10" fill="#fdf1f7" filter="url(#soft4)"/>
  <rect x="40" y="30" width="6" height="48" rx="3" fill="url(#lineGrad4)"/>
  <text x="220" y="59" text-anchor="middle" font-size="13" fill="#333">Content type structural change</text>

  <!-- Row 2: decision -->
  <rect x="40" y="104" width="360" height="48" rx="24" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="220" y="133" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Immediate or deferred?</text>

  <!-- Row 2 side: terminal -->
  <rect x="460" y="104" width="200" height="48" rx="10" fill="white" stroke="#e35aa0" stroke-width="2"/>
  <text x="560" y="122" text-anchor="middle" font-size="11.5" font-style="italic" fill="#4a4a4a">Rebuild database cache</text>
  <text x="560" y="137" text-anchor="middle" font-size="11.5" font-style="italic" fill="#4a4a4a">source now (blocking)</text>

  <!-- Row 3 -->
  <rect x="40" y="178" width="360" height="48" rx="10" fill="#fdf1f7" filter="url(#soft4)"/>
  <rect x="40" y="178" width="6" height="48" rx="3" fill="url(#lineGrad4)"/>
  <text x="220" y="207" text-anchor="middle" font-size="13" fill="#333">Queue rebuild IDs</text>

  <!-- Row 4 (2 lines) -->
  <rect x="40" y="246" width="360" height="64" rx="10" fill="#fdf1f7" filter="url(#soft4)"/>
  <rect x="40" y="246" width="6" height="64" rx="3" fill="url(#lineGrad4)"/>
  <text x="220" y="272" text-anchor="middle" font-size="13" fill="#333">Background worker drains IDs and</text>
  <text x="220" y="290" text-anchor="middle" font-size="13" fill="#333">rebuilds the affected source cache</text>

  <!-- Row 5 -->
  <rect x="40" y="336" width="360" height="48" rx="10" fill="#fdf1f7" filter="url(#soft4)"/>
  <rect x="40" y="336" width="6" height="48" rx="3" fill="url(#lineGrad4)"/>
  <text x="220" y="365" text-anchor="middle" font-size="13" fill="#333">Clear matching HybridCache tags</text>

  <!-- Row 6 -->
  <rect x="40" y="410" width="360" height="48" rx="10" fill="#fdf1f7" filter="url(#soft4)"/>
  <rect x="40" y="410" width="6" height="48" rx="3" fill="url(#lineGrad4)"/>
  <text x="220" y="439" text-anchor="middle" font-size="13" fill="#333">Clear matching converted-object cache</text>
</svg>
