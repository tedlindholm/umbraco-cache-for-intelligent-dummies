<svg viewBox="0 0 1060 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#667eea" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8f96bd"/>
    </marker>
  </defs>

  <rect width="1060" height="760" fill="white"/>

  <text x="530" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2f3142">Umbraco wraps Microsoft HybridCache</text>
  <text x="530" y="62" text-anchor="middle" font-size="12" fill="#6b708c">Site code calls content-shaped Umbraco APIs; only internal services touch the generic string-keyed cache.</text>

  <rect x="355" y="98" width="350" height="64" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="355" y="98" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="125" text-anchor="middle" font-size="13" fill="#2f3142">Your template / controller</text>
  <text x="530" y="142" text-anchor="middle" font-size="13" fill="#2f3142">umbracoHelper.Content(id)</text>

  <rect x="355" y="198" width="350" height="54" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="355" y="198" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="230" text-anchor="middle" font-size="13" fill="#2f3142">ICacheManager</text>

  <rect x="355" y="288" width="350" height="64" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="355" y="288" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="315" text-anchor="middle" font-size="13" fill="#2f3142">IPublishedContentCache</text>
  <text x="530" y="332" text-anchor="middle" font-size="13" fill="#2f3142">(DocumentCache)</text>

  <rect x="355" y="388" width="350" height="64" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="355" y="388" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="415" text-anchor="middle" font-size="13" fill="#2f3142">IDocumentCacheService /</text>
  <text x="530" y="432" text-anchor="middle" font-size="13" fill="#2f3142">DocumentCacheService</text>

  <rect x="355" y="508" width="350" height="72" rx="10" fill="#eef5ff" stroke="#dde1f2" stroke-width="1.5"/>
  <rect x="355" y="508" width="6" height="72" rx="3" fill="url(#lineGrad)"/>
  <text x="530" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#667eea">Microsoft HybridCache</text>
  <text x="530" y="556" text-anchor="middle" font-size="12" fill="#2f3142">generic, string-keyed engine</text>

  <rect x="70" y="508" width="240" height="72" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="70" y="508" width="6" height="72" rx="3" fill="url(#lineGrad)"/>
  <text x="190" y="536" text-anchor="middle" font-size="13" fill="#2f3142">L0</text>
  <text x="190" y="553" text-anchor="middle" font-size="12" fill="#2f3142">ConvertedPublished</text>
  <text x="190" y="569" text-anchor="middle" font-size="12" fill="#2f3142">ContentCache</text>

  <rect x="750" y="508" width="240" height="72" rx="8" fill="#f3f4fb" filter="url(#soft)"/>
  <rect x="750" y="508" width="6" height="72" rx="3" fill="url(#lineGrad)"/>
  <text x="870" y="536" text-anchor="middle" font-size="13" fill="#2f3142">IDatabaseCacheRepository</text>
  <text x="870" y="553" text-anchor="middle" font-size="12" fill="#6b708c">source on cache miss</text>

  <rect x="70" y="640" width="240" height="54" rx="8" fill="white" stroke="#dde1f2"/>
  <text x="190" y="672" text-anchor="middle" font-size="13" fill="#2f3142">IMemoryCache (L1)</text>

  <rect x="355" y="640" width="350" height="54" rx="8" fill="white" stroke="#dde1f2"/>
  <text x="530" y="672" text-anchor="middle" font-size="13" fill="#2f3142">IDistributedCache (optional L2)</text>

  <rect x="750" y="640" width="240" height="54" rx="8" fill="white" stroke="#dde1f2"/>
  <text x="870" y="672" text-anchor="middle" font-size="13" fill="#2f3142">umbracoContentNu table</text>

  <g stroke="#8f96bd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M530 162 V190"/>
    <path d="M530 252 V280"/>
    <path d="M530 352 V380"/>
    <path d="M530 452 V500"/>
    <path d="M355 544 H318"/>
    <path d="M705 544 H742"/>
    <path d="M530 580 V632"/>
    <path d="M530 608 H190 V632"/>
    <path d="M870 580 V632"/>
  </g>

  <g font-size="11" fill="#667eea">
    <rect x="416" y="477" width="228" height="22" rx="11" fill="white"/>
    <text x="530" y="492" text-anchor="middle">internal Umbraco services cross this boundary</text>
  </g>

  <text x="530" y="730" text-anchor="middle" font-size="12" fill="#6b708c">Everything above the shaded box is Umbraco's content-shaped API; the shaded box is Microsoft's generic cache engine.</text>
</svg>
