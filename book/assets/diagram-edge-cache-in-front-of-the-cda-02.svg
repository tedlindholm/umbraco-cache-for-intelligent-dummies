<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="white"/>

  <path d="M360,14 V446" stroke="#f5d9e8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="14" width="300" height="54" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="40" y="14" width="6" height="54" rx="3" fill="url(#lineGrad2)"/>
  <text x="193" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">Media file behind a CDN</text>
  <text x="193" y="56" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">Chapter 13 — the object is its URL</text>

  <rect x="380" y="14" width="300" height="54" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="380" y="14" width="6" height="54" rx="3" fill="url(#lineGrad2)"/>
  <text x="533" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">CDA response behind an edge cache</text>
  <text x="533" y="56" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">this chapter — the answer moves under the URL</text>

  <rect x="40" y="92" width="300" height="44" rx="8" fill="white" stroke="#f5d9e8"/>
  <text x="190" y="119" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#2f3142">/media/a1b2/hero.jpg</text>

  <rect x="380" y="92" width="300" height="44" rx="8" fill="white" stroke="#f5d9e8"/>
  <text x="530" y="119" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#2f3142">.../content/item/home</text>

  <path d="M190,136 V166" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M530,136 V166" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <rect x="40" y="170" width="300" height="58" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="40" y="170" width="6" height="58" rx="3" fill="url(#lineGrad2)"/>
  <text x="193" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Fixed bytes</text>
  <text x="193" y="214" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">the same for the file's lifetime</text>

  <rect x="380" y="170" width="300" height="58" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="380" y="170" width="6" height="58" rx="3" fill="url(#lineGrad2)"/>
  <text x="533" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">A recomputed answer</text>
  <text x="533" y="214" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">different after every publish</text>

  <text x="190" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#e35aa0">WHEN THE FILE CHANGES</text>
  <text x="530" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#e35aa0">WHEN CONTENT CHANGES</text>

  <rect x="40" y="278" width="300" height="80" rx="8" fill="white" stroke="#f5d9e8"/>
  <text x="190" y="304" text-anchor="middle" font-size="11" fill="#2f3142">A new upload gets a new path.</text>
  <text x="190" y="323" text-anchor="middle" font-size="11" fill="#2f3142">The old URL still maps to the old</text>
  <text x="190" y="342" text-anchor="middle" font-size="11" fill="#2f3142">bytes, so it can simply expire.</text>

  <rect x="380" y="278" width="300" height="80" rx="8" fill="white" stroke="#f5d9e8"/>
  <text x="530" y="304" text-anchor="middle" font-size="11" fill="#2f3142">The same URL now returns new</text>
  <text x="530" y="323" text-anchor="middle" font-size="11" fill="#2f3142">JSON. The old entry is wrong —</text>
  <text x="530" y="342" text-anchor="middle" font-size="11" fill="#2f3142">and nothing tells the edge.</text>

  <rect x="40" y="384" width="300" height="60" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="40" y="384" width="6" height="60" rx="3" fill="url(#lineGrad2)"/>
  <text x="193" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Freshness = URL stability</text>
  <text x="193" y="429" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">the edge never needs telling</text>

  <rect x="380" y="384" width="300" height="60" rx="10" fill="#fdf1f7" filter="url(#soft2)"/>
  <rect x="380" y="384" width="6" height="60" rx="3" fill="url(#lineGrad2)"/>
  <text x="533" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Freshness = explicit purge</text>
  <text x="533" y="429" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">the edge must be told on publish</text>
</svg>
