<svg viewBox="0 0 808 268" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>
  <rect width="808" height="268" fill="white"/>

  <!-- connectors -->
  <path d="M184,150 H204 V90 H224" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M184,150 H204 V210 H224" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M384,90 H424" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M384,210 H424" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M584,210 H624" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- lane captions -->
  <text x="224" y="48" font-size="11" font-weight="600" fill="#e35aa0">Inside Umbraco</text>
  <text x="224" y="256" font-size="11" font-weight="600" fill="#e35aa0">At the edge</text>

  <!-- PUB -->
  <rect x="24" y="128" width="160" height="44" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="24" y="128" width="6" height="44" rx="3" fill="url(#lineGrad)"/>
  <text x="104" y="154" text-anchor="middle" font-size="12" fill="#2f3142">Editor publishes</text>

  <!-- REF (top, 2 lines) -->
  <rect x="224" y="66" width="160" height="48" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="224" y="66" width="6" height="48" rx="3" fill="url(#lineGrad)"/>
  <text x="304" y="86" text-anchor="middle" font-size="12" fill="#2f3142">ContentCacheRefresher</text>
  <text x="304" y="102" text-anchor="middle" font-size="11" fill="#6b708c">Chapter 9</text>

  <!-- CDAEVICT (top, 3 lines) -->
  <rect x="424" y="59" width="160" height="62" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="424" y="59" width="6" height="62" rx="3" fill="url(#lineGrad)"/>
  <text x="504" y="80" text-anchor="middle" font-size="12" fill="#2f3142">CDA output cache</text>
  <text x="504" y="95" text-anchor="middle" font-size="12" fill="#2f3142">evicted by tag</text>
  <text x="504" y="110" text-anchor="middle" font-size="11" fill="#6b708c">Chapter 4</text>

  <!-- NOTIFY (bottom, 3 lines) -->
  <rect x="224" y="179" width="160" height="62" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="224" y="179" width="6" height="62" rx="3" fill="url(#lineGrad)"/>
  <text x="304" y="200" text-anchor="middle" font-size="12" fill="#2f3142">Notification handler</text>
  <text x="304" y="215" text-anchor="middle" font-size="12" fill="#2f3142">resolves affected</text>
  <text x="304" y="230" text-anchor="middle" font-size="12" fill="#2f3142">item URLs</text>

  <!-- PURGE (bottom, 3 lines) -->
  <rect x="424" y="179" width="160" height="62" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="424" y="179" width="6" height="62" rx="3" fill="url(#lineGrad)"/>
  <text x="504" y="200" text-anchor="middle" font-size="12" fill="#2f3142">Vendor purge call</text>
  <text x="504" y="215" text-anchor="middle" font-size="12" fill="#2f3142">APIM / Front Door /</text>
  <text x="504" y="230" text-anchor="middle" font-size="12" fill="#2f3142">Cloudflare</text>

  <!-- EDGE (bottom, 3 lines) -->
  <rect x="624" y="179" width="160" height="62" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="624" y="179" width="6" height="62" rx="3" fill="url(#lineGrad)"/>
  <text x="704" y="200" text-anchor="middle" font-size="12" fill="#2f3142">Item entries dropped</text>
  <text x="704" y="215" text-anchor="middle" font-size="12" fill="#2f3142">now; query entries</text>
  <text x="704" y="230" text-anchor="middle" font-size="12" fill="#2f3142">wait for TTL</text>
</svg>
