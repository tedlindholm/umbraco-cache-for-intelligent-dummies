<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="820" height="360" fill="white"/>
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2f3142">Media change evicts related page HTML</text>

  <rect x="54" y="84" width="210" height="70" rx="11" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="54" y="84" width="6" height="70" rx="3" fill="url(#lineGrad)"/>
  <text x="159" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Page: /team</text>
  <text x="159" y="134" text-anchor="middle" font-size="12" fill="#6b708c">cached HTML response</text>

  <rect x="54" y="220" width="210" height="70" rx="11" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="54" y="220" width="6" height="70" rx="3" fill="url(#lineGrad)"/>
  <text x="159" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Member photo</text>
  <text x="159" y="270" text-anchor="middle" font-size="12" fill="#6b708c">media item</text>

  <path d="M164,154 C190,186 190,205 164,220" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="180" y="170" width="90" height="24" rx="12" fill="white"/>
  <text x="225" y="186" text-anchor="middle" font-size="11" fill="#e35aa0">references</text>

  <rect x="330" y="220" width="180" height="70" rx="11" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="330" y="220" width="6" height="70" rx="3" fill="url(#lineGrad)"/>
  <text x="420" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Media changes</text>
  <text x="420" y="270" text-anchor="middle" font-size="12" fill="#6b708c">save, delete, or replace</text>

  <rect x="568" y="220" width="198" height="70" rx="11" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="568" y="220" width="6" height="70" rx="3" fill="url(#lineGrad)"/>
  <text x="667" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Media cache refresher</text>
  <text x="667" y="265" text-anchor="middle" font-size="12" fill="#6b708c">finds related pages</text>

  <path d="M264,255 H322" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M510,255 H560" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M667,220 C650,142 530,114 272,119" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="430" y="104" width="202" height="26" rx="13" fill="white"/>
  <text x="531" y="121" text-anchor="middle" font-size="11" fill="#e35aa0">evict page output-cache entry</text>

  <text x="410" y="328" text-anchor="middle" font-size="12" fill="#6b708c">The media item changed, so any cached page that embeds it must be treated as stale.</text>
</svg>
