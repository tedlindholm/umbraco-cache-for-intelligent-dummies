<text x="360" y="249" text-anchor="middle" font-size="11" font-weight="400" fill="#e35aa0" font-style="italic">no</text>
<path d="M360,338 C360,370 360,370 360,402" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

