<text x="360" y="129.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Collect seed keys from</text>
<text x="360" y="146.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">providers</text>
<rect x="205" y="190" width="310" height="54" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="205" y="190" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
<text x="360" y="221" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Batch keys</text>
