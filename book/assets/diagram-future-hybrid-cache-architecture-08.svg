<rect x="205" y="356" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
<text x="360" y="383.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Fetch uncached nodes from</text>
<text x="360" y="400.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">database cache source</text>
<rect x="205" y="444" width="310" height="54" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
