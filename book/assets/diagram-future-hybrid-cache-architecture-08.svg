      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>
  <rect width="720" height="522" fill="white"/>
<path d="M360,78 C360,90 360,90 360,102" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,166 C360,178 360,178 360,190" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,244 C360,256 360,256 360,268" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,332 C360,344 360,344 360,356" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,420 C360,432 360,432 360,444" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<rect x="205" y="24" width="310" height="54" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="205" y="24" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
<text x="360" y="55" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Application starting</text>
