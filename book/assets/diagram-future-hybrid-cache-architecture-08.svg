<text x="360" y="295.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Skip keys already in</text>
<text x="360" y="312.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">HybridCache</text>
