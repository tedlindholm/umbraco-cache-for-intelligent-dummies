<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="white"/>

  <rect x="300" y="34" width="300" height="52" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="300" y="34" width="6" height="52" rx="3" fill="url(#lineGrad)"/>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#2f3142">Need data for a feature</text>

  <rect x="270" y="130" width="360" height="62" rx="31" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="450" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#2f3142">Do you already know the exact</text>
  <text x="450" y="174" text-anchor="middle" font-size="14" font-weight="700" fill="#2f3142">item, route, or source?</text>

  <path d="M450,86 V122" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M360,192 C240,225 170,250 132,286" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M450,192 V284" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M540,192 C660,225 728,250 768,286" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="225" text-anchor="middle" font-size="12" fill="#e35aa0" font-style="italic">yes</text>
  <text x="488" y="244" text-anchor="middle" font-size="12" fill="#e35aa0" font-style="italic">small result</text>
  <text x="630" y="225" text-anchor="middle" font-size="12" fill="#e35aa0" font-style="italic">no</text>

  <rect x="42" y="292" width="250" height="126" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="42" y="292" width="6" height="126" rx="3" fill="url(#lineGrad)"/>
  <text x="167" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Known item path</text>
  <text x="167" y="348" text-anchor="middle" font-size="12" fill="#4b4d60">Need the current published</text>
  <text x="167" y="365" text-anchor="middle" font-size="12" fill="#4b4d60">representation?</text>
  <text x="167" y="395" text-anchor="middle" font-size="13" fill="#2f3142">Use published-content APIs</text>

  <rect x="325" y="292" width="250" height="126" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="325" y="292" width="6" height="126" rx="3" fill="url(#lineGrad)"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Known computed answer</text>
  <text x="450" y="348" text-anchor="middle" font-size="12" fill="#4b4d60">Need to avoid rebuilding a</text>
  <text x="450" y="365" text-anchor="middle" font-size="12" fill="#4b4d60">small menu, footer, or DTO?</text>
  <text x="450" y="395" text-anchor="middle" font-size="13" fill="#2f3142">Use RuntimeCache + invalidation</text>

  <rect x="608" y="292" width="250" height="126" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="608" y="292" width="6" height="126" rx="3" fill="url(#lineGrad)"/>
  <text x="733" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Discovery problem</text>
  <text x="733" y="348" text-anchor="middle" font-size="12" fill="#4b4d60">Need filtering or search across</text>
  <text x="733" y="365" text-anchor="middle" font-size="12" fill="#4b4d60">many possible items?</text>
  <text x="733" y="395" text-anchor="middle" font-size="13" fill="#2f3142">Use an Examine index</text>

  <text x="450" y="462" text-anchor="middle" font-size="12" fill="#6b708c">Caches remember known answers; indexes help find answers.</text>
</svg>
