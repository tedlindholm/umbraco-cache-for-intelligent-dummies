<svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c98cae"/>
    </marker>
  </defs>

  <rect width="1100" height="760" fill="white"/>

  <text x="550" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#2f3142">Hybrid Cache published-content read path</text>
  <text x="550" y="64" text-anchor="middle" font-size="12" fill="#6b708c">DocumentCacheService asks HybridCache first. A miss reads the database source, materialises the result, then stores it back.</text>

  <rect x="390" y="96" width="320" height="54" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="390" y="96" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="128" text-anchor="middle" font-size="13" fill="#2f3142">IPublishedContentCache</text>

  <rect x="390" y="176" width="320" height="54" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="390" y="176" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="208" text-anchor="middle" font-size="13" fill="#2f3142">DocumentCache</text>

  <rect x="362" y="256" width="376" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="362" y="256" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="283" text-anchor="middle" font-size="13" fill="#2f3142">IDocumentCacheService /</text>
  <text x="550" y="300" text-anchor="middle" font-size="13" fill="#2f3142">DocumentCacheService</text>

  <rect x="362" y="370" width="376" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="362" y="370" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="397" text-anchor="middle" font-size="13" fill="#2f3142">Microsoft HybridCache</text>
  <text x="550" y="414" text-anchor="middle" font-size="12" fill="#6b708c">TryGetValueAsync</text>

  <rect x="80" y="370" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="80" y="370" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="205" y="397" text-anchor="middle" font-size="13" fill="#2f3142">Use cached value</text>
  <text x="205" y="414" text-anchor="middle" font-size="12" fill="#6b708c">HybridCache hit</text>

  <rect x="770" y="370" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="770" y="370" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="895" y="397" text-anchor="middle" font-size="13" fill="#2f3142">IDatabaseCacheRepository</text>
  <text x="895" y="414" text-anchor="middle" font-size="12" fill="#6b708c">GetContentSourceAsync</text>

  <rect x="770" y="488" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="770" y="488" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="895" y="515" text-anchor="middle" font-size="13" fill="#2f3142">umbracoContentNu</text>
  <text x="895" y="532" text-anchor="middle" font-size="12" fill="#6b708c">database table</text>

  <rect x="425" y="488" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="425" y="488" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="515" text-anchor="middle" font-size="13" fill="#2f3142">Deserialise and</text>
  <text x="550" y="532" text-anchor="middle" font-size="13" fill="#2f3142">materialise</text>

  <rect x="80" y="488" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="80" y="488" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="205" y="515" text-anchor="middle" font-size="13" fill="#2f3142">Store value back</text>
  <text x="205" y="532" text-anchor="middle" font-size="12" fill="#6b708c">HybridCache.SetAsync</text>

  <rect x="425" y="624" width="250" height="64" rx="8" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="425" y="624" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
  <text x="550" y="651" text-anchor="middle" font-size="13" fill="#2f3142">Return published</text>
  <text x="550" y="668" text-anchor="middle" font-size="13" fill="#2f3142">content object</text>

  <g stroke="#c98cae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
    <path d="M550 150 V168"/>
    <path d="M550 230 V248"/>
    <path d="M550 320 V362"/>
    <path d="M362 402 H338"/>
    <path d="M738 402 H762"/>
    <path d="M895 434 V480"/>
    <path d="M770 520 H683"/>
    <path d="M425 520 H338"/>
    <path d="M205 434 V460 H58 V656 H417"/>
    <path d="M205 552 V590 H382 V656 H417"/>
  </g>

  <g font-size="11" fill="#e35aa0">
    <rect x="336" y="391" width="38" height="22" rx="11" fill="white"/>
    <text x="355" y="406" text-anchor="middle">hit</text>
    <rect x="726" y="391" width="46" height="22" rx="11" fill="white"/>
    <text x="749" y="406" text-anchor="middle">miss</text>
  </g>

  <text x="550" y="724" text-anchor="middle" font-size="12" fill="#6b708c">NuCache names still appear nearby, but this diagram follows the v17 Hybrid Cache read-through path.</text>
</svg>
