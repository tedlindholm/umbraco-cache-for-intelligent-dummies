<svg viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="940" height="560" fill="white"/>

  <text x="470" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2f3142">Publish creates one refresh instruction, then each server updates its own caches</text>

  <rect x="326" y="70" width="288" height="52" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="326" y="70" width="6" height="52" rx="3" fill="url(#lineGrad)"/>
  <text x="470" y="101" text-anchor="middle" font-size="13" fill="#2f3142">Editor publishes content</text>

  <rect x="326" y="148" width="288" height="58" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="326" y="148" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="470" y="172" text-anchor="middle" font-size="13" fill="#2f3142">Umbraco creates a cache</text>
  <text x="470" y="190" text-anchor="middle" font-size="13" fill="#2f3142">refresher payload</text>

  <rect x="326" y="232" width="288" height="58" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="326" y="232" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="470" y="256" text-anchor="middle" font-size="13" fill="#2f3142">DistributedCache queues</text>
  <text x="470" y="274" text-anchor="middle" font-size="13" fill="#2f3142">the refresh</text>

  <rect x="326" y="316" width="288" height="58" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="326" y="316" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="470" y="340" text-anchor="middle" font-size="13" fill="#2f3142">IServerMessenger broadcasts</text>
  <text x="470" y="358" text-anchor="middle" font-size="13" fill="#2f3142">the instruction</text>

  <rect x="326" y="400" width="288" height="58" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="326" y="400" width="6" height="58" rx="3" fill="url(#lineGrad)"/>
  <text x="470" y="424" text-anchor="middle" font-size="13" fill="#2f3142">Each server runs the</text>
  <text x="470" y="442" text-anchor="middle" font-size="13" fill="#2f3142">refresher locally</text>

  <path d="M470,122 V140" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M470,206 V224" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M470,290 V308" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M470,374 V392" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M470,458 V482" stroke="#cf95b6" stroke-width="2" fill="none"/>
  <path d="M118,482 H822" stroke="#cf95b6" stroke-width="2" fill="none"/>

  <rect x="44" y="500" width="178" height="42" rx="9" fill="#fdeff6" stroke="#f5d9e8"/>
  <text x="133" y="518" text-anchor="middle" font-size="11" fill="#2f3142">published content cache</text>
  <text x="133" y="533" text-anchor="middle" font-size="11" fill="#2f3142">refreshed or removed</text>

  <rect x="282" y="500" width="178" height="42" rx="9" fill="#fdeff6" stroke="#f5d9e8"/>
  <text x="371" y="518" text-anchor="middle" font-size="11" fill="#2f3142">routing and navigation</text>
  <text x="371" y="533" text-anchor="middle" font-size="11" fill="#2f3142">caches updated</text>

  <rect x="520" y="500" width="178" height="42" rx="9" fill="#fdeff6" stroke="#f5d9e8"/>
  <text x="609" y="518" text-anchor="middle" font-size="11" fill="#2f3142">website output-cache</text>
  <text x="609" y="533" text-anchor="middle" font-size="11" fill="#2f3142">entries evicted by tag</text>

  <rect x="758" y="500" width="138" height="42" rx="9" fill="#fdeff6" stroke="#f5d9e8"/>
  <text x="827" y="518" text-anchor="middle" font-size="11" fill="#2f3142">related pages</text>
  <text x="827" y="533" text-anchor="middle" font-size="11" fill="#2f3142">evicted too</text>

  <path d="M133,482 V492" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M371,482 V492" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M609,482 V492" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M827,482 V492" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
