<svg viewBox="0 0 1200 1290" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#e35aa0" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="1290" fill="white"/>

  <!-- Timeline centre line (rect, not <line>, so the gradient paints) -->
  <rect x="598" y="40" width="4" height="1210" rx="2" fill="url(#lineGrad)"/>

  <!-- ============ v7 (left) ============ -->
  <g>
    <rect x="85" y="40" width="460" height="150" rx="12" fill="#f8f9fa" stroke="#ececf3" stroke-width="1" filter="url(#soft)"/>
    <rect x="85" y="40" width="6" height="150" rx="3" fill="url(#lineGrad)"/>
    <text x="521" y="80" text-anchor="end" font-size="21" font-weight="700" fill="#e35aa0">Umbraco v7</text>
    <!-- badge: AppCache -->
    <rect x="429" y="100" width="92" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="475" y="118.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">AppCache</text>
    <text x="521" y="152" text-anchor="end" font-size="14" fill="#555">Legacy in-memory cache. Foundation for</text>
    <text x="521" y="172" text-anchor="end" font-size="14" fill="#555">future implementations.</text>
  </g>
  <circle cx="600" cy="115" r="10" fill="white" stroke="#e35aa0" stroke-width="4"/>
  <text x="622" y="120" text-anchor="start" font-size="15" font-weight="700" fill="#b83a86">2013 - 2019</text>

  <!-- ============ v8 - v14 (right) ============ -->
  <g>
    <rect x="655" y="290" width="460" height="170" rx="12" fill="#f8f9fa" stroke="#ececf3" stroke-width="1" filter="url(#soft)"/>
    <rect x="1109" y="290" width="6" height="170" rx="3" fill="url(#lineGrad)"/>
    <text x="679" y="330" text-anchor="start" font-size="21" font-weight="700" fill="#e35aa0">Umbraco v8 - v14</text>
    <!-- badges: NuCache, JSON Serializer -->
    <rect x="679" y="350" width="84" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="721" y="368.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">NuCache</text>
    <rect x="775" y="350" width="138" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="844" y="368.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">JSON Serializer</text>
    <text x="679" y="402" text-anchor="start" font-size="14" fill="#555">Published-content cache with JSON</text>
    <text x="679" y="422" text-anchor="start" font-size="14" fill="#555">serialization. Long-standing architecture</text>
    <text x="679" y="442" text-anchor="start" font-size="14" fill="#555">providing distributed cache support.</text>
  </g>
  <circle cx="600" cy="375" r="10" fill="white" stroke="#e35aa0" stroke-width="4"/>
  <text x="578" y="380" text-anchor="end" font-size="15" font-weight="700" fill="#b83a86">2019 - 2024</text>

  <!-- ============ v15 (left) ============ -->
  <g>
    <rect x="85" y="540" width="460" height="190" rx="12" fill="#f8f9fa" stroke="#ececf3" stroke-width="1" filter="url(#soft)"/>
    <rect x="85" y="540" width="6" height="190" rx="3" fill="url(#lineGrad)"/>
    <text x="521" y="580" text-anchor="end" font-size="21" font-weight="700" fill="#e35aa0">Umbraco v15</text>
    <!-- badges: Hybrid Cache (gradient), MessagePack Serializer -->
    <rect x="205" y="600" width="116" height="28" rx="14" fill="url(#badgeGrad)"/>
    <text x="263" y="618.5" text-anchor="middle" font-size="13" font-weight="600" fill="white">Hybrid Cache</text>
    <rect x="333" y="600" width="188" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="427" y="618.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">MessagePack Serializer</text>
    <text x="521" y="652" text-anchor="end" font-size="14" fill="#555">Introduction of Hybrid Cache built on .NET's</text>
    <text x="521" y="672" text-anchor="end" font-size="14" fill="#555">HybridCache. Replaces NuCache with more</text>
    <text x="521" y="692" text-anchor="end" font-size="14" fill="#555">efficient architecture. MessagePack</text>
    <text x="521" y="712" text-anchor="end" font-size="14" fill="#555">becomes default serializer.</text>
  </g>
  <circle cx="600" cy="635" r="10" fill="white" stroke="#e35aa0" stroke-width="4"/>
  <text x="622" y="640" text-anchor="start" font-size="15" font-weight="700" fill="#b83a86">2024</text>

  <!-- ============ v16 - v17 (right) ============ -->
  <g>
    <rect x="655" y="800" width="460" height="190" rx="12" fill="#f8f9fa" stroke="#ececf3" stroke-width="1" filter="url(#soft)"/>
    <rect x="1109" y="800" width="6" height="190" rx="3" fill="url(#lineGrad)"/>
    <text x="679" y="840" text-anchor="start" font-size="21" font-weight="700" fill="#e35aa0">Umbraco v16 - v17</text>
    <!-- badges: Hybrid Cache (gradient), MessagePack -->
    <rect x="679" y="860" width="116" height="28" rx="14" fill="url(#badgeGrad)"/>
    <text x="737" y="878.5" text-anchor="middle" font-size="13" font-weight="600" fill="white">Hybrid Cache</text>
    <rect x="807" y="860" width="116" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="865" y="878.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">MessagePack</text>
    <text x="679" y="912" text-anchor="start" font-size="14" fill="#555">Refinement and maturation of Hybrid Cache.</text>
    <text x="679" y="932" text-anchor="start" font-size="14" fill="#555">NuCache names persist in compatibility</text>
    <text x="679" y="952" text-anchor="start" font-size="14" fill="#555">seams (settings, SQL templates, comments).</text>
    <text x="679" y="972" text-anchor="start" font-size="14" fill="#555">JSON serializer deprecated, for testing.</text>
  </g>
  <circle cx="600" cy="895" r="10" fill="white" stroke="#e35aa0" stroke-width="4"/>
  <text x="578" y="900" text-anchor="end" font-size="15" font-weight="700" fill="#b83a86">2024 - 2025</text>

  <!-- ============ v18 (left) ============ -->
  <g>
    <rect x="85" y="1060" width="460" height="190" rx="12" fill="#f8f9fa" stroke="#ececf3" stroke-width="1" filter="url(#soft)"/>
    <rect x="85" y="1060" width="6" height="190" rx="3" fill="url(#lineGrad)"/>
    <text x="521" y="1100" text-anchor="end" font-size="21" font-weight="700" fill="#e35aa0">Umbraco v18</text>
    <!-- badges: Hybrid Cache (gradient), MessagePack -->
    <rect x="277" y="1120" width="116" height="28" rx="14" fill="url(#badgeGrad)"/>
    <text x="335" y="1138.5" text-anchor="middle" font-size="13" font-weight="600" fill="white">Hybrid Cache</text>
    <rect x="405" y="1120" width="116" height="28" rx="14" fill="white" stroke="#e35aa0" stroke-width="2"/>
    <text x="463" y="1138.5" text-anchor="middle" font-size="13" font-weight="600" fill="#e35aa0">MessagePack</text>
    <text x="521" y="1172" text-anchor="end" font-size="14" fill="#555">Continued evolution with potential further</text>
    <text x="521" y="1192" text-anchor="end" font-size="14" fill="#555">refinement of Hybrid Cache. Legacy</text>
    <text x="521" y="1212" text-anchor="end" font-size="14" fill="#555">NuCache vocabulary remains for backward</text>
    <text x="521" y="1232" text-anchor="end" font-size="14" fill="#555">compatibility.</text>
  </g>
  <circle cx="600" cy="1155" r="10" fill="white" stroke="#e35aa0" stroke-width="4"/>
  <text x="622" y="1160" text-anchor="start" font-size="15" font-weight="700" fill="#b83a86">2025+</text>
</svg>
