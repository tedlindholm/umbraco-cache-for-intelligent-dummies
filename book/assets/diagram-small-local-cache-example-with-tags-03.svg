<svg viewBox="0 0 770 738" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>
  <rect width="770" height="738" fill="white"/>
<g stroke="#cf95b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)">
  <path d="M385 102 L385 166"/>
  <path d="M385 230 L385 256 L203 256 L203 284"/>
  <path d="M385 230 L385 256 L567 256 L567 284"/>
  <path d="M567 348 L567 374 L203 374 L203 402"/>
  <path d="M567 348 L567 402"/>
</g>
<text x="294" y="249" text-anchor="middle" font-size="11" font-weight="400" fill="#e35aa0" font-style="italic">yes</text>
<text x="476" y="249" text-anchor="middle" font-size="11" font-weight="400" fill="#e35aa0" font-style="italic">no</text>
<text x="385" y="367" text-anchor="middle" font-size="11" font-weight="400" fill="#e35aa0" font-style="italic">yes</text>
<text x="584" y="377" text-anchor="middle" font-size="11" font-weight="400" fill="#e35aa0" font-style="italic">no</text>
<rect x="230" y="48" width="310" height="54" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="230" y="48" width="6" height="54" rx="3" fill="url(#lineGrad)"/>
<text x="385" y="79" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">I want to cache custom data</text>
<rect x="230" y="166" width="310" height="64" rx="28" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="5 4" filter=""/>

<text x="385" y="193.5" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">Single server or just learning</text>
<text x="385" y="210.5" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">the pattern?</text>
<rect x="48" y="284" width="310" height="64" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="48" y="284" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
<text x="203" y="311.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">RuntimeCache + ClearByKey is a</text>
<text x="203" y="328.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">good start</text>
<rect x="412" y="284" width="310" height="64" rx="28" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="5 4" filter=""/>

<text x="567" y="311.5" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">Will backoffice changes affect</text>
<text x="567" y="328.5" text-anchor="middle" font-size="13" font-weight="600" fill="#2f3142">the data?</text>
<rect x="48" y="402" width="310" height="64" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="48" y="402" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
<text x="203" y="429.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Add ICacheRefresher +</text>
<text x="203" y="446.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">DistributedCache</text>
<rect x="412" y="402" width="310" height="64" rx="10" fill="#fdf1f7" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="412" y="402" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
<text x="567" y="429.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Simple local cache may still</text>
<text x="567" y="446.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">be enough</text>
