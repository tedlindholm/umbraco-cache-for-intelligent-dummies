<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e35aa0"/>
      <stop offset="100%" stop-color="#b83a86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e35aa0" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf95b6"/>
    </marker>
  </defs>

  <rect width="920" height="470" fill="white"/>

  <rect x="310" y="34" width="300" height="52" rx="10" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="310" y="34" width="6" height="52" rx="3" fill="url(#lineGrad)"/>
  <text x="460" y="65" text-anchor="middle" font-size="14" fill="#2f3142">I need data for a feature</text>

  <rect x="292" y="122" width="336" height="58" rx="29" fill="white" stroke="#e35aa0" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="460" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#2f3142">What kind of problem is it?</text>
  <text x="460" y="165" text-anchor="middle" font-size="12" fill="#6b708c">Pick the shape of the work, then pick the tool.</text>

  <path d="M460,86 V114" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M370,180 C285,208 220,226 164,250" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M460,180 V242" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M550,180 C635,208 700,226 756,250" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="42" y="250" width="250" height="138" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="42" y="250" width="6" height="138" rx="3" fill="url(#lineGrad)"/>
  <text x="167" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Known content</text>
  <text x="167" y="309" text-anchor="middle" font-size="12" fill="#4b4d60">Load by known id, key, route,</text>
  <text x="167" y="326" text-anchor="middle" font-size="12" fill="#4b4d60">or current request context.</text>
  <text x="167" y="360" text-anchor="middle" font-size="13" fill="#2f3142">Use published-content APIs</text>

  <rect x="335" y="250" width="250" height="138" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="335" y="250" width="6" height="138" rx="3" fill="url(#lineGrad)"/>
  <text x="460" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Repeated small answer</text>
  <text x="460" y="309" text-anchor="middle" font-size="12" fill="#4b4d60">Reuse a menu, footer, DTO,</text>
  <text x="460" y="326" text-anchor="middle" font-size="12" fill="#4b4d60">or lookup table.</text>
  <text x="460" y="360" text-anchor="middle" font-size="13" fill="#2f3142">Use RuntimeCache</text>

  <rect x="628" y="250" width="250" height="138" rx="12" fill="#fdf1f7" filter="url(#soft)"/>
  <rect x="628" y="250" width="6" height="138" rx="3" fill="url(#lineGrad)"/>
  <text x="753" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3142">Search or filtering</text>
  <text x="753" y="309" text-anchor="middle" font-size="12" fill="#4b4d60">Find matching items across</text>
  <text x="753" y="326" text-anchor="middle" font-size="12" fill="#4b4d60">many possible nodes.</text>
  <text x="753" y="360" text-anchor="middle" font-size="13" fill="#2f3142">Use Examine</text>

  <path d="M167,388 V414 H320" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="244" y="431" text-anchor="middle" font-size="11" fill="#e35aa0">optionally add output caching</text>

  <path d="M460,388 V430" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="448" text-anchor="middle" font-size="11" fill="#e35aa0">add invalidation when the source changes</text>

  <path d="M753,388 V414 H600" stroke="#cf95b6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="674" y="431" text-anchor="middle" font-size="11" fill="#e35aa0">query the index, avoid broad traversal</text>
</svg>
